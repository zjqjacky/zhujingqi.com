
<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
		<title>Jackypedia - Zhujingqi</title>
		<link rel="icon" type="image/svg+xml" href="icon.svg">
		<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
		<link rel="apple-touch-icon" sizes="120x120" href="icon.png">
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
		</script>
		<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js">
		</script>
		<style>
			:root {
				--bg: #fff;
				--bg2: #f5f5f7;
				--bg3: #e8e8ed;
				--text: #1d1d1f;
				--text2: #86868b;
				--text3: #aeaeb2;
				--border: #d2d2d7;
				--accent: #FF9500;
				--accent2: #E68700;
				--accent3: #FFF3E0;
				--red: #ff3b30;
				--orange: #ff9500;
				--green: #34c759;
				--shadow-sm: 0 1px 3px rgba(0, 0, 0, .04);
				--shadow: 0 2px 20px rgba(0, 0, 0, .08);
				--shadow-lg: 0 8px 40px rgba(0, 0, 0, .12);
				--radius-sm: 20px;
				--radius: 20px;
				--radius-lg: 20px;
				--nav-h: 60px;
				--font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
				--mono: "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
				--max-w: 1100px;
			}

			@media(prefers-color-scheme:dark) {
				:root {
					--bg: #000;
					--bg2: #1c1c1e;
					--bg3: #2c2c2e;
					--text: #d1d1d6;
					--text2: #6e6e73;
					--text3: #48484a;
					--border: #38383a;
					--accent: #CC7700;
					--accent2: #B36600;
					--accent3: #1a2a3e;
					--shadow-sm: 0 1px 3px rgba(0, 0, 0, .2);
					--shadow: 0 2px 20px rgba(0, 0, 0, .4);
					--shadow-lg: 0 8px 40px rgba(0, 0, 0, .6)
				}
			}

			body.dark {
				--bg: #000;
				--bg2: #1c1c1e;
				--bg3: #2c2c2e;
				--text: #d1d1d6;
				--text2: #6e6e73;
				--text3: #48484a;
				--border: #38383a;
				--accent: #CC7700;
				--accent2: #B36600;
				--accent3: #1a2a3e;
				--shadow-sm: 0 1px 3px rgba(0, 0, 0, .2);
				--shadow: 0 2px 20px rgba(0, 0, 0, .4);
				--shadow-lg: 0 8px 40px rgba(0, 0, 0, .6)
			}

			body.dark nav {
				background: rgba(0, 0, 0, .8)
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box
			}

			html,
			body {
				height: 100%
			}

			body {
				font-family: var(--font);
				background: var(--bg);
				color: var(--text);
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				line-height: 1.6;
				overflow: hidden;
				user-select: none;
				-webkit-user-select: none
			}

			input,
			textarea,
			button,
			select {
				font-family: var(--font);
				outline: none
			}

			input,
			textarea,
			[contenteditable] {
				user-select: text;
				-webkit-user-select: text
			}

			a {
				color: var(--accent);
				text-decoration: none
			}

			a:hover {
				text-decoration: underline
			}

			::-webkit-scrollbar {
				width: 6px;
				height: 6px
			}

			::-webkit-scrollbar-track {
				background: transparent
			}

			::-webkit-scrollbar-thumb {
				background: var(--text3);
				border-radius: 20px
			}

			::-webkit-scrollbar-thumb:hover {
				background: var(--text2)
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(12px)
				}

				to {
					opacity: 1;
					transform: translateY(0)
				}
			}

			@keyframes fadeInUp {
				from {
					opacity: 0;
					transform: translateY(24px)
				}

				to {
					opacity: 1;
					transform: translateY(0)
				}
			}

			@keyframes scaleIn {
				from {
					opacity: 0;
					transform: scale(.95)
				}

				to {
					opacity: 1;
					transform: scale(1)
				}
			}

			@keyframes spin {
				to {
					transform: rotate(360deg)
				}
			}

			.anim-fade {
				animation: fadeIn .4s ease
			}

			.anim-fade-up {
				animation: fadeInUp .6s ease
			}

			.loading-overlay {
				display: none;
				position: fixed;
				inset: 0;
				z-index: 400;
				background: rgba(0, 0, 0, .3);
				backdrop-filter: blur(8px);
				align-items: center;
				justify-content: center
			}

			.loading-overlay.active {
				display: flex
			}

			.loading-spinner {
				width: 36px;
				height: 36px;
				border: 2.5px solid var(--bg3);
				border-top-color: var(--accent);
				border-radius: 50%;
				animation: spin .8s linear infinite
			}

			.loading-text {
				margin-top: 10px;
				font-size: 13px;
				color: var(--text2);
				font-weight: 500
			}

			nav {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				height: var(--nav-h);
				z-index: 100;
				background: rgba(255, 255, 255, .8);
				backdrop-filter: blur(30px) saturate(1.4);
				-webkit-backdrop-filter: blur(30px) saturate(1.4);
				border-bottom: 1px solid var(--border);
				display: flex;
				align-items: center;
				padding: 0 24px;
				gap: 8px
			}

			@media(prefers-color-scheme:dark) {
				nav {
					background: rgba(0, 0, 0, .8)
				}
			}

			.nav-scroll {
				display: flex;
				align-items: center;
				gap: 8px;
				width: 100%;
				max-width: var(--max-w);
				margin: 0 auto
			}

			.nav-logo {
				display: flex;
				align-items: center;
				gap: 8px;
				cursor: pointer;
				flex-shrink: 0;
				font-size: 16px;
				font-weight: 700;
				letter-spacing: -.2px;
				height: 30px;
				border: 0;
				background: transparent;
				color: var(--text);
				font-family: var(--font);
				padding: 0
			}

			.nav-link {
				font-size: 13px;
				font-weight: 500;
				color: var(--text2);
				cursor: pointer;
				padding: 6px 10px;
				border-radius: 20px;
				transition: all .2s;
				white-space: nowrap;
				display: flex;
				align-items: center;
				gap: 4px;
				background: transparent;
				border: 0;
				font-family: var(--font)
			}

			.nav-link:hover {
				color: var(--text);
				background: var(--bg2)
			}

			.nav-link.active {
				color: var(--accent);
				background: var(--accent3)
			}

			.nav-search {
				flex: 1;
				max-width: 320px;
				margin: 0 12px;
				display: flex;
				align-items: center
			}

			.nav-search input {
				flex: 1;
				height: 34px;
				padding: 0 14px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: var(--bg2);
				color: var(--text);
				font-size: 13px;
				transition: all .25s
			}

			.nav-search input:focus {
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(255, 149, 0, .1);
				background: var(--bg)
			}

			.nav-search input::placeholder {
				color: var(--text3)
			}

			.nav-search-btn {
				height: 30px;
				padding: 0 10px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--text2);
				font-size: 12px;
				cursor: pointer;
				margin-left: 6px;
				transition: all .2s;
				font-family: var(--font);
				flex-shrink: 0;
				white-space: nowrap;
				font-weight: 500
			}

			.nav-search-btn:hover {
				background: var(--accent);
				color: #fff;
				border-color: var(--accent)
			}

			.nav-right {
				display: flex;
				align-items: center;
				gap: 6px;
				flex-shrink: 0
			}

			.nav-btn {
				height: 30px;
				padding: 0 14px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: transparent;
				color: var(--text);
				font-size: 12px;
				font-weight: 500;
				cursor: pointer;
				transition: all .2s;
				white-space: nowrap;
				display: flex;
				align-items: center;
				gap: 5px;
				font-family: var(--font)
			}

			.nav-btn:hover {
				background: var(--bg2);
				border-color: var(--text3)
			}

			.nav-btn.primary {
				background: var(--accent);
				color: #fff;
				border-color: var(--accent)
			}

			.nav-btn.primary:hover {
				background: var(--accent2)
			}

			.user-btn {
				height: 30px;
				padding: 0 8px 0 4px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: transparent;
				cursor: pointer;
				display: flex;
				align-items: center;
				gap: 6px;
				transition: all .2s
			}

			.user-btn:hover {
				background: var(--bg2)
			}

			.user-avatar-wrap {
				width: 22px;
				height: 22px;
				border-radius: 50%;
				overflow: hidden;
				flex-shrink: 0;
				background: var(--bg2);
				display: flex;
				align-items: center;
				justify-content: center
			}

			.user-avatar-wrap img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block
			}

			.user-avatar-wrap .av-initial {
				font-size: 12px;
				font-weight: 600;
				color: var(--text2);
				line-height: 22px
			}

			.user-name {
				font-size: 12px;
				font-weight: 500;
				color: var(--text);
				max-width: 80px;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap
			}

			.user-link {
				color: var(--orange);
				cursor: pointer;
				font-weight: 500;
				transition: opacity .2s
			}

			.user-link:hover {
				opacity: .7;
				text-decoration: underline
			}

			.screen {
				display: none;
				height: 100vh;
				padding-top: var(--nav-h)
			}

			.screen.active {
				display: flex;
				flex-direction: column
			}

			#welcomeScreen {
				overflow-y: auto
			}

			.welcome-wrap {
				max-width: var(--max-w);
				margin: 0 auto;
				width: 100%;
				padding: 0 24px
			}

			.hero-section {
				padding: 48px 0 32px;
				text-align: center
			}

			.hero-row {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 24px;
				margin-bottom: 6px
			}

			.hero-side {
				flex: 0 0 180px;
				font-size: 11px;
				color: var(--text3);
				line-height: 1.5;
				text-align: left
			}

			.hero-right {
				text-align: right
			}

			.hero-announce {
				margin-bottom: 2px;
				overflow: hidden;
				text-overflow: ellipsis;
				display: -webkit-box;
				-webkit-line-clamp: 2;
				-webkit-box-orient: vertical
			}

			.hero-stats span {
				display: inline;
				margin-right: 8px
			}

			.hero-btn {
				height: 28px;
				padding: 0 10px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: transparent;
				color: var(--text3);
				font-size: 11px;
				font-weight: 500;
				cursor: pointer;
				transition: all .2s;
				font-family: var(--font)
			}

			.hero-btn:hover {
				color: var(--accent);
				border-color: var(--accent)
			}

			.hero-title {
				font-size: 80px;
				font-weight: 800;
				letter-spacing: -3px;
				line-height: 1.0;
				color: var(--text)
			}

			.hero-sub {
				font-size: 28px;
				font-weight: 500;
				color: var(--text2);
				margin-bottom: 4px
			}

			.hero-icon {
				width: 80px;
				height: 80px;
				display: block;
				margin: 0 auto 8px;
				filter: drop-shadow(0 4px 20px rgba(255, 149, 0, .25))
			}

			.hero-slogan {
				font-size: 16px;
				font-weight: 500;
				color: var(--accent);
				letter-spacing: 1px;
				margin-top: 12px
			}

			.hero-slogan::before,
			.hero-slogan::after {
				content: '';
				display: inline-block;
				width: 40px;
				height: 1px;
				background: var(--border);
				vertical-align: middle;
				margin: 0 16px
			}

			.section {
				margin-bottom: 40px
			}

			.section-header {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 16px;
				font-size: 18px;
				font-weight: 600
			}

			.section-header .sec-count {
				font-size: 12px;
				font-weight: 400;
				color: var(--text2);
				margin-left: auto
			}

			.card-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
				gap: 10px
			}

			.card {
				padding: 16px;
				border-radius: var(--radius);
				border: 1px solid var(--border);
				cursor: pointer;
				transition: all .25s ease;
				background: var(--bg)
			}

			.card:hover {
				border-color: var(--accent);
				box-shadow: var(--shadow);
				transform: translateY(-2px)
			}

			.card h3 {
				font-size: 14px;
				font-weight: 600;
				margin-bottom: 3px;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap
			}

			.card p {
				font-size: 12px;
				color: var(--text2)
			}

			.card .card-meta {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-top: 6px;
				font-size: 11px;
				color: var(--text3)
			}


			#allScreen {
				overflow-y: auto
			}

			.all-header {
				padding: 24px 24px 8px;
				font-size: 18px;
				font-weight: 600;
				max-width: var(--max-w);
				margin: 0 auto;
				width: 100%
			}

			.sort-bar {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 0 24px 12px;
				max-width: var(--max-w);
				margin: 0 auto;
				width: 100%;
				flex-wrap: wrap
			}

			.sort-lbl {
				font-size: 12px;
				color: var(--text3);
				font-weight: 500;
				margin-right: 4px
			}

			.sort-btn {
				height: 28px;
				padding: 0 10px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--text2);
				font-size: 11px;
				font-weight: 500;
				cursor: pointer;
				transition: all .2s;
				font-family: var(--font)
			}

			.sort-btn:hover {
				background: var(--bg2);
				color: var(--text)
			}

			.sort-btn.active {
				background: var(--accent);
				color: #fff;
				border-color: var(--accent)
			}

			.all-grid {
				max-width: var(--max-w);
				margin: 0 auto;
				width: 100%;
				padding: 0 24px 80px;
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
				gap: 10px
			}

			/* ─── Tags ─── */
			.tag {
				padding: 2px 10px;
				border-radius: 20px;
				border: 1px solid var(--accent);
				color: var(--accent);
				font-size: 11px;
				font-weight: 500;
				cursor: pointer;
				transition: all .2s;
				background: transparent;
				display: inline-block;
				white-space: nowrap
			}

			.tag:hover {
				background: var(--accent);
				color: #fff
			}

			.tag.active {
				background: var(--accent);
				color: #fff
			}

			.page-tags {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
				margin-bottom: 14px
			}

			.tag-bar {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
				align-items: center
			}

			.tag-bar .tag-lbl {
				font-size: 11px;
				color: var(--text3);
				font-weight: 500;
				margin-right: 2px
			}

			.all-tags {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
				padding: 0 24px 10px;
				max-width: var(--max-w);
				margin: 0 auto;
				width: 100%
			}

			.tag-input-wrap {
				display: flex;
				gap: 4px;
				margin-top: 6px
			}

			.tag-input-wrap input {
				flex: 1;
				height: 28px;
				padding: 0 10px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: var(--bg2);
				color: var(--text);
				font-size: 11px;
				min-width: 80px
			}

			.tag-input-wrap input:focus {
				border-color: var(--accent);
				background: var(--bg)
			}

			.tag-input-wrap button {
				height: 28px;
				padding: 0 10px;
				border-radius: 20px;
				border: 0;
				background: var(--accent);
				color: #fff;
				font-size: 11px;
				cursor: pointer;
				font-family: var(--font);
				white-space: nowrap
			}

			.tag-sel {
				display: flex;
				flex-wrap: wrap;
				gap: 4px;
				margin-top: 6px
			}

			.tag-sel .tag {
				cursor: pointer;
				font-size: 11px;
				padding: 2px 8px
			}

			.tag-sel .tag.selected {
				background: var(--accent);
				color: #fff;
				border-color: var(--accent)
			}

			.edit-tags {
				padding: 6px 16px;
				border-bottom: 1px solid var(--border);
				background: var(--bg);
				flex-shrink: 0;
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 6px
			}

			.tag-hdr {
				font-size: 11px;
				color: var(--text3);
				font-weight: 500;
				margin-right: 2px;
				white-space: nowrap
			}

			/* ─── Page View + Comments ─── */
			#pageScreen {
				overflow-y: auto;
				scroll-behavior: smooth
			}

			.page-wrap {
				max-width: 720px;
				margin: 0 auto;
				padding: 32px 24px 80px;
				width: 100%
			}

			.page-title {
				font-size: 40px;
				font-weight: 700;
				letter-spacing: -.5px;
				line-height: 1.15;
				margin-bottom: 4px
			}

			.page-meta {
				color: var(--text2);
				font-size: 13px;
				margin-bottom: 20px;
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
				align-items: center
			}

			.page-meta .dot {
				width: 3px;
				height: 3px;
				border-radius: 50%;
				background: var(--text3);
				display: inline-block;
				margin: 0 2px
			}

			.page-actions {
				display: flex;
				gap: 6px;
				margin-bottom: 24px
			}

			.page-actions button {
				height: 30px;
				padding: 0 14px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--text);
				font-size: 12px;
				font-weight: 500;
				cursor: pointer;
				transition: all .2s;
				display: flex;
				align-items: center;
				gap: 4px
			}

			.page-actions button:hover {
				background: var(--accent);
				color: #fff;
				border-color: var(--accent)
			}

			.page-actions button.danger:hover {
				background: var(--red);
				border-color: var(--red)
			}


			#pageContent,
			.comments-section,
			.refs-section,
			.refs-list {
				user-select: text;
				-webkit-user-select: text
			}

			#pageContent h1 {
				font-size: 30px;
				font-weight: 600;
				margin: 32px 0 10px;
				padding-bottom: 8px;

			let currentLang = (() => {
				const s = localStorage.getItem("pedia_lang");
				if (s) return s;
				const l = navigator.language || "zh";
				if (l === "zh-TW" || l === "zh-HK") return "zh-TW";
				const sh = l.split("-")[0];
				const sup = {
					zh: "zh",
					en: "en",
					es: "es",
					de: "de"
				};
				return sup[sh] || "zh";
			})();

			function t(key, ...args) {
				const k = TRANSLATIONS[key];
				if (!k) return key;
				let val = k[currentLang] || k["zh"] || key;
				args.forEach((a, i) => {
					val = val.replace(new RegExp("\\{" + i + "\\}", "g"), String(a));
				});
				return val;
			}

			function renderLangSelect() {
				const ids = ["langSelect", "mobLangSelect"];
				ids.forEach(id => {
					const sel = document.getElementById(id);
					if (!sel) return;
					sel.innerHTML = "";
					LANGS.forEach(l => {
						const o = document.createElement("option");
						o.value = l.v;
						o.textContent = t(l.k);
						sel.appendChild(o);
					});
					sel.value = currentLang;
					sel.onchange = () => changeLanguage(sel.value);
				});
			}

			function changeLanguage(lang) {
				currentLang = lang;
				localStorage.setItem("pedia_lang", lang);
				renderLangSelect();
				if (typeof refreshUILanguage === "function") refreshUILanguage();
				updateDarkBtn();
				// Re-render current view
				if (S.view === "welcomeScreen" || S.view === "welcome") home();
				else if (S.view === "allScreen") {
					renderAllTags();
					renderAllGrid();
				} else if (S.view === "pageScreen" && S.slug) {
					goTo(S.slug, true);
				} else if (S.view === "profileScreen") {
					openProfile(true);
				} else if (S.view === "searchScreen" && $('qryInp').value) sr($('qryInp').value);
			}

			// ─── Dark Mode ───
			function toggleDark() {
				document.body.classList.toggle("dark");
				localStorage.setItem("pedia_dark", document.body.classList.contains("dark") ? "1" : "0");
				updateDarkBtn();
			}

			function updateDarkBtn() {
				const isDark = document.body.classList.contains("dark");
				const mobBtn = document.querySelector("#mobMenu .dark-toggle-btn");
				if (mobBtn) mobBtn.textContent = isDark ? t("light_mode") : t("dark_mode");
				const deskBtn = document.getElementById("darkBtn");
				if (deskBtn) deskBtn.textContent = isDark ? "☀" : "☾";
			}

			async function load(key) {
				try {
					let r = await fetch(DB_R + key);
					let t = await r.text();
					return t ? JSON.parse(t) : {}
				} catch {
					return {}
				}
			}
			async function save(key, v) {
				let p = new URLSearchParams();
				p.append('key', key);
				p.append('value', JSON.stringify(v));
				await fetch(DB_W, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded'
					},
					body: p
				})
			}
			async function sha(s) {
				const d = new TextEncoder().encode(s);
				const h = await crypto.subtle.digest('SHA-256', d);
				return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('')
			}

			async function apiPost(path, body) {
				const r = await fetch(API_BASE + path, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						Authorization: 'Bearer ' + SUPA_KEY
					},
					body: JSON.stringify(body)
				});
				const t = await r.text();
				if (!r.ok) {
					let m = t;
					try {
						const j = JSON.parse(t);
						if (j.error) m = j.error
					} catch {}
					throw new Error(m)
				}
				return t ? JSON.parse(t) : null;
			}
			async function supaGet(path) {
				const r = await fetch(SUPA_URL + path, {
					headers: {
						apikey: SUPA_KEY
					}
				});
				if (!r.ok) throw new Error(await r.text());
				return r.json();
			}
			async function supaPost(path, body) {
				const r = await fetch(SUPA_URL + path, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						apikey: SUPA_KEY,
						Prefer: 'return=minimal'
					},
					body: JSON.stringify(body)
				});
				if (!r.ok) throw new Error(await r.text());
			}
			async function supaDelete(path) {
				const r = await fetch(SUPA_URL + path, {
					method: 'DELETE',
					headers: {
						apikey: SUPA_KEY
					}
				});
				if (!r.ok) throw new Error(await r.text());
			}

			// Load pedia index from Supabase
			async function loadIndex() {
				const arr = await supaGet(
					'/pedia?select=slug,title,owner_id,allow_others,tags,views,created,updated,users(name)');
				const idx = {};
				arr.forEach(row => {
					idx[row.slug] = {
						title: row.title,
						owner_id: row.owner_id,
						owner_name: row.users ? row.users.name || '' : '',
						allow_others: row.allow_others,
						tags: row.tags || [],
						views: row.views,
						created: row.created,
						updated: row.updated
					};
				});
				return idx;
			}

			// ─── URL Routing ───
			function setURL(slug) {
				const url = new URL(location);
				url.searchParams.delete('view');
				url.searchParams.delete('user');
				if (slug) url.searchParams.set('id', slug);
				else url.searchParams.delete('id');
				const state = slug ? {
					view: 'page',
					slug
				} : {
					view: 'home'
				};
				if (slug) history.pushState(state, '', url);
				else history.replaceState(state, '', url);
			}

			function pushView(view, param) {
				const url = new URL(location);
				url.searchParams.delete('id');
				url.searchParams.delete('view');
				url.searchParams.delete('user');
				if (view === 'all') url.searchParams.set('view', 'all');
				else if (view === 'profile') url.searchParams.set('user', param);
				history.pushState({
					view,
					param: param || ''
				}, '', url);
			}
			window.addEventListener('popstate', async e => {
				if (!await checkEditDirty()) {
					history.pushState(null, '', location.href);
					return
				}
				const s = e.state;
				if (!s || s.view === 'home') {
					home()
				} else if (s.view === 'page' && s.slug) {
					goTo(s.slug, true)
				} else if (s.view === 'all') {
					allWiki(true)
				} else if (s.view === 'profile' && s.param) {
					showUserPages(s.param, true)
				} else if (s.view === 'edit') {
					editPage()
				} else {
					home()
				}
			});

			function openLogin(m) {

			function upLogin() {
				$('modalTitle').textContent = regMode ? t("reg_title") : t("login_title");
				$('loginUser').style.display = '';
				$('loginPass').style.display = '';
				$('regUser').style.display = regMode ? '' : 'none';
				$('regPass').style.display = regMode ? '' : 'none';
				$('regPass2').style.display = regMode ? '' : 'none';
				$('modalBtn').textContent = regMode ? t("reg_btn") : t("login_btn_txt");
				$('modalSwitch').textContent = regMode ? t("login_switch_login") : t("login_switch_reg");
				$('modalErr').style.display = 'none';
			}
			$('modalSwitch').addEventListener('click', () => {
				regMode = !regMode;
				upLogin()
			});
			$('modalCancel').addEventListener('click', () => $('loginModal').classList.remove('active'));
			$('modalBtn').addEventListener('click', async () => {
				const e = $('modalErr');
				e.style.display = 'none';
				const btn = $('modalBtn');
				btn.disabled = true;
				try {
					if (!regMode) {
						const u = $('loginUser').value.trim(),
							p = $('loginPass').value.trim();
						if (!u || !p) {
							e.textContent = t("toast_fill_all");
							e.style.display = 'block';
							return
						}
						const h = await sha(p);
						const data = await wl(apiPost('/api/auth/login', {
							name: u,
							pass: h
						}), t("load_verify"));
						S.userId = String(data.id);
						S.user = data.name;
						S.userName = data.name;
						S.userAvatar = data.avatar || '';
						localStorage.setItem('pedia_user_id', S.userId);
						commentUserCache[S.userId] = {
							name: S.userName,
							avatar: S.userAvatar
						};
						$('loginModal').classList.remove('active');
						toast(t("toast_welcome", data.name));
						nav();
						home();
					} else {
						const u = $('regUser').value.trim(),
							p1 = $('regPass').value.trim(),
							p2 = $('regPass2').value.trim();
						if (!u || !p1 || !p2) {
							e.textContent = t("toast_fill_all");
							e.style.display = 'block';
							return
						}
						if (!/^[A-Za-z0-9_\-áéíóúñÁÉÍÓÚÑäöüßÄÖÜ]+$/.test(u)) {
							e.textContent = t("toast_invalid_chars");
							e.style.display = 'block';
							return
						}
						if (p1 !== p2) {
							e.textContent = t("toast_pass_mismatch");
							e.style.display = 'block';
							return
						}
						if (p1.length < 3) {
							e.textContent = t("toast_pass_short");
							e.style.display = 'block';
							return
						}
						const h = await sha(p1);
						const data = await wl(apiPost('/api/auth/register', {
							name: u,
							pass: h,
							time: new Date().toISOString()
						}), t("load_registering"));
						S.userId = String(data.id);
						S.user = data.name;
						S.userName = data.name;
						S.userAvatar = data.avatar || '';
						localStorage.setItem('pedia_user_id', S.userId);
						commentUserCache[S.userId] = {
							name: S.userName,
							avatar: S.userAvatar
						};
						$('loginModal').classList.remove('active');
						toast(t("toast_reg", data.name));
						nav();
						home();
					}
				} catch (err) {
					const msg = err.message;
					if (msg.includes('duplicate') || msg.includes('already')) e.textContent = t("toast_user_exists");
					else if (msg.includes('Wrong password') || msg.includes('wrong')) e.textContent = t(
						"toast_wrong_pass");
					else if (msg.includes('not found')) e.textContent = t("toast_user_not_found");
					else e.textContent = msg;
					e.style.display = 'block';
				} finally {
					btn.disabled = false
				}
			});

			function card(slug, meta) {
				const views = meta.views ? `<span>${meta.views}</span>` : '';
				const date = meta.updated ? new Date(meta.updated).toLocaleDateString() : '';
				const tags = (meta.tags || []).map(t =>
					`<span class="tag" onclick="event.stopPropagation();filterByTag('${esc(t)}')">${esc(t)}</span>`).join('');
				return `<div class="card anim-fade-up" onclick="goTo('${slug}')" style="animation-delay:${Math.random()*.12}s"><h3>${esc(meta.title||slug)}</h3><p>${meta.owner_name?`<a class="user-link" onclick="event.stopPropagation();showUserPages('${esc(meta.owner_name)}')">${esc(meta.owner_name)}</a>`:''}</p><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${tags}</div><div class="card-meta">${views?views+' ':'<span></span>'}${date?'<span>'+date+'</span>':''}</div></div>`;
			}

			function randomPage() {
				const slugs = Object.keys(S.index);
				if (!slugs.length) {
					toast(t("no_new"));
					return
				}
				goTo(slugs[Math.floor(Math.random() * slugs.length)]);
			}

			// ─── All Wiki ───
			let sortMode = 'timeD',
				activeTag = '';

			function sortEntries(entries, mode) {
				return entries.sort((a, b) => {
					const ta = a[1].title || a[0],
						tb = b[1].title || b[0];
					const da = a[1].updated || a[1].created || '',
						db = b[1].updated || b[1].created || '';
					if (mode === 'timeD') return da > db ? -1 : da < db ? 1 : 0;
					if (mode === 'timeA') return da < db ? -1 : da > db ? 1 : 0;
					if (mode === 'alphaA') return ta.localeCompare(tb);
					if (mode === 'alphaD') return tb.localeCompare(ta);
					return 0;
				});
			}

			function renderAllGrid() {
				let entries = Object.entries(S.index);
				if (activeTag === '__other__') entries = entries.filter(([, m]) => (m.tags || []).some(t => !PRESET_TAGS
					.includes(t)));
				else if (activeTag) entries = entries.filter(([, m]) => (m.tags || []).includes(activeTag));
				entries = sortEntries(entries, sortMode);
				$('allGrid').innerHTML = entries.length ? entries.map(([slug, meta]) => card(slug, meta)).join('') :
					'<div class="empty" style="grid-column:1/-1;padding:60px 20px"><h2>' + t("no_new") + '</h2><p>' + t(
						"login_to_create") + '</p></div>';
			}

			function renderAllTags() {
				const tagSet = new Set();
				Object.values(S.index).forEach(m => (m.tags || []).forEach(t => tagSet.add(t)));
				const allTags = Array.from(tagSet);
				const presetTags = allTags.filter(t => PRESET_TAGS.includes(t)).sort();
				const customTags = allTags.filter(t => !PRESET_TAGS.includes(t));
				let html = '<span class="tag' + (activeTag === '' ? ' active' : '') + '" onclick="filterByTag(' + `''` + ')">' +
					t("filter_all") + '</span>';
				presetTags.forEach(t => {
					html +=
						`<span class="tag${t===activeTag?' active':''}" onclick="filterByTag('${esc(t)}')">${esc(t)}</span>`
				});
				if (customTags.length) html +=
					`<span class="tag${activeTag==='__other__'?' active':''}" onclick="filterByTag('__other__')">${t("filter_other")}</span>`;
				$('allTags').innerHTML = html;
			}

			function filterByTag(t) {
				if (t === '' || t === activeTag) {
					activeTag = '';
				} else activeTag = t;
				if (S.view === 'allScreen') {
					renderAllGrid();
					renderAllTags()
				} else allWiki();
			}

				screen('allScreen');

				const b = e.target.closest('.sort-btn');

				$$('#sortBar .sort-btn').forEach(btn => btn.classList.remove('active'));

				renderAllGrid();
			});
			$('allNavBtn').addEventListener('click', async () => {
				if (!await checkEditDirty()) return;

				allWiki()
			});

			// ─── Navigate with URL ───

					$('pageMeta').innerHTML = `

				} else if (meta) $('pageContent').innerHTML = '<p style="color:var(--text2);padding:20px 0">' + t(
					"page_empty") + '</p>';

						"login_to_create")) + '</p></div>';

				}

			async function trackView(slug) {
				if (!S.index[slug]) return;
				S.index[slug].views = (S.index[slug].views || 0) + 1;
				await upsertIndexEntry(slug, S.index[slug]);
			}

			// ─── Comments (Threaded, with Avatars from Supabase) ───
			let commentData = null;
			let commentUserCache = {};
			const AVATAR_COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#D4A5A5', '#9B59B6', '#3498DB',
				'#E67E22', '#2ECC71', '#E74C3C', '#1ABC9C'
			];

			function avatarColor(s) {
				let h = 0;
				for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % AVATAR_COLORS.length;
				return AVATAR_COLORS[h];
			}

			// userCache: { userId -> {name, avatar} }
			function renderCommentTree(comments, parentId, dep, slugContext, userCache) {
				dep = dep || 0;
				if (dep > 8) return '';
				const children = comments.filter(c => c.parentId === parentId).sort((a, b) => a.id - b.id);
				if (!children.length) return '';
				const s = slugContext || S.slug;
				return children.map(c => {
					const uid = c.userId;
					const cu = uid ? userCache[uid] : null;
					const displayName = cu ? cu.name : (c.userName || c.user || '?');
					const displayAvatar = cu ? cu.avatar : null;
					const avHtml = displayAvatar ? `<img src="${esc(displayAvatar)}" alt="">` : '';
					const initial = displayName ? esc(displayName[0]).toUpperCase() : '?';
					const nested = renderCommentTree(comments, c.id, dep + 1, s, userCache);
					return `<div class="comment-item" data-cid="${c.id}">
      <div class="comment-hdr">
        <div class="comment-av" style="background:${avatarColor(uid||displayName)}">${avHtml||initial}</div>
        <span class="comment-author"><a class="user-link" onclick="showUserPages('${esc(displayName)}')">${esc(displayName)}</a></span>
        <span class="comment-time">${c.time?new Date(c.time).toLocaleString():''}</span>
      </div>
      <div class="comment-body">${esc(c.text)}</div>
      <div class="comment-actions">
        <button onclick="showReplyForm(${c.id})">${t("reply")}</button>
        ${(uid===S.userId||(!uid&&c.user===S.user))?`<button class="del" onclick="delComment('${s}',${c.id})">${t("del")}</button>`:''}
      </div>
      <div class="comment-reply-form" id="replyForm${c.id}">
        <textarea id="replyInput${c.id}" placeholder="${t("reply_ph",esc(displayName))}" rows="1"></textarea>
        <button onclick="submitReply(${c.id})">${t("comment_btn")}</button>
      </div>
      ${nested?`<div class="comment-nested">${nested}</div>`:''}
    </div>`;
				}).join('');
			}

			async function fetchCommentUsers(comments) {
				if (!comments || !comments.length) return {};
				const ids = [],
					names = [];
				comments.forEach(c => {
					if (c.userId && !commentUserCache[c.userId]) ids.push(c.userId);
					if (!c.userId && c.user && !commentUserCache['n_' + c.user]) names.push(c.user);
				});
				if (ids.length) {
					try {
						const arr = await supaGet('/users?id=in.(' + ids.join(',') + ')&select=id,name,avatar');
						arr.forEach(u => {
							if (u) commentUserCache[u.id] = {
								name: u.name,
								avatar: u.avatar || ''
							}
						});
					} catch {}
				}
				if (names.length) {
					try {
						const enc = names.map(n => encodeURIComponent(n));
						const arr = await supaGet('/users?name=in.(' + enc.join(',') + ')&select=name,avatar');
						(arr || []).forEach(u => {
							if (u) commentUserCache['n_' + u.name] = {
								name: u.name,
								avatar: u.avatar || ''
							}
						});
					} catch {}
				}
				return commentUserCache;
			}

			async function loadComments(slug) {
				$('commentsSection').style.display = '';
				$('commentForm').style.display = S.user ? '' : 'none';
				if (!S.user) $('commentList').innerHTML = '<div class="empty-comments">' + t("login_comment") + '</div>';
				commentData = await load('zhujingqi_pedia_' + slug);
				await fetchCommentUsers(commentData?.comments);
				renderComments(slug);
			}

			function renderComments(slug) {
				const list = $('commentList');
				const comments = commentData?.comments || [];
				if (!comments.length && S.user) {
					list.innerHTML = '<div class="empty-comments">' + t("no_comments") + '</div>';
					return
				}
				list.innerHTML = renderCommentTree(comments, null, 0, slug, commentUserCache);
			}
			$('commentBtn').addEventListener('click', async () => {
				if (!S.user) {
					toast(t("toast_login_first"));
					openLogin();
					return
				}

				if (!text) {
					toast(t("toast_enter_comment"));
					return
				}
				const slug = S.slug;
				if (!slug || !S.index[slug]) return;
				const data = await wl(load('zhujingqi_pedia_' + slug), '提交中...');
				if (!data.comments) data.comments = [];
				data.comments.push({
					id: Date.now(),
					userId: S.userId,
					userName: S.userName || S.user,
					text,
					time: new Date().toISOString(),
					parentId: null
				});
				await save('zhujingqi_pedia_' + slug, data);
				await updateRankCache(S.userName || S.user, {
					comments: 1
				});
				commentData = data;
				commentUserCache[S.userId] = {
					name: S.userName || S.user,
					avatar: S.userAvatar || ''
				};
				renderComments(slug);

				toast(t("toast_comment_sent"));

			$('commentInput').addEventListener('keydown', e => {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault();
					$('commentBtn').click()
				}
			});

			function showReplyForm(cid) {

				const all = document.querySelectorAll('.comment-reply-form.active');

					}

				}

				}

			async function delComment(slug, cid) {
				const ok = await showConfirm(t("confirm_delete_comment"));
				if (!ok) return;
				const data = await load('zhujingqi_pedia_' + slug);
				if (data.comments) {
					const toRemove = new Set([cid]);
					let prevSize = 0;
					while (prevSize !== toRemove.size) {
						prevSize = toRemove.size;
						data.comments.forEach(c => {
							if (toRemove.has(c.parentId)) toRemove.add(c.id)
						});
					}
					// Update rank cache before removing
					const cc = {};
					data.comments.forEach(c => {
						if (toRemove.has(c.id)) {
							const un = c.userName || c.user || '';
							if (un) cc[un] = (cc[un] || 0) + 1
						}
					});
					for (const [un, cnt] of Object.entries(cc)) await updateRankCache(un, {
						comments: -cnt
					});
					data.comments = data.comments.filter(c => !toRemove.has(c.id));
				}
				await save('zhujingqi_pedia_' + slug, data);
				commentData = data;
				renderComments(slug);
				toast(t("toast_comment_deleted"));
			}

			function renderGalEdit() {

    <div class="gal-item" draggable="true" data-idx="${i}"><div class="gal-img-wrap"><img src="${esc(url)}" draggable="false" onerror="imgError(this)"></div><button class="gal-del" draggable="false" onclick="removeGalItem(${i})">✕</button></div>

			function imgError(el){el.outerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:11px">'+t("gal_load_fail")+'</div>'}
			function initGalDrag(){
				const list=$('galList');
				if(!list)return;
				let dragIdx=-1;
				list.addEventListener('dragstart',e=>{
					const item=e.target.closest('.gal-item');
					if(!item)return;
					dragIdx=parseInt(item.dataset.idx);
					item.classList.add('dragging');
					e.dataTransfer.effectAllowed='move';
					e.dataTransfer.setData('text/plain',dragIdx);
				});
				list.addEventListener('dragend',e=>{
					const item=e.target.closest('.gal-item');
					if(item)item.classList.remove('dragging');
					list.querySelectorAll('.gal-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
					dragIdx=-1;
				});
				list.addEventListener('dragover',e=>{
					e.preventDefault();
					e.dataTransfer.dropEffect='move';
				});
				list.addEventListener('dragenter',e=>{
					e.preventDefault();
					const item=e.target.closest('.gal-item');
					if(!item||parseInt(item.dataset.idx)===dragIdx)return;
					item.classList.add('drag-over');
				});
				list.addEventListener('dragleave',e=>{
					const item=e.target.closest('.gal-item');
					if(item)item.classList.remove('drag-over');
				});
				list.addEventListener('drop',e=>{
					e.preventDefault();
					if(dragIdx<0)return;
					const item=e.target.closest('.gal-item');
					let targetIdx=item?parseInt(item.dataset.idx):editGallery.length-1;
					if(dragIdx===targetIdx){dragIdx=-1;list.querySelectorAll('.gal-item.drag-over').forEach(el=>el.classList.remove('drag-over'));return}
					const arr=editGallery.splice(dragIdx,1);
					if(targetIdx>dragIdx)targetIdx--;
					editGallery.splice(targetIdx,0,arr[0]);
					dragIdx=-1;
					list.querySelectorAll('.gal-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
					renderGalEdit();
					editDirty=true;
				});
			}

				}

					open = $('editOpen').checked;
				btn.classList.add('loading');
				try {
					await wl((async () => {
						// Preserve comments when editing
						const existing = await load('zhujingqi_pedia_' + slug);
						if (!isNew && existing.content && existing.content.length > 100 && c.length <
							existing.content.length * 0.5) {
							throw new Error(t("toast_mass_delete"));
						}
						await save('zhujingqi_pedia_' + slug, {
							content: c,

							allowOthers: open,
							comments: existing.comments || [],
							images: editGallery,
							references: editRefs,
							tags: editTags
						});
						S.index[slug] = {
							title,
							owner_id: parseInt(S.index[slug]?.owner_id || S.userId),
							owner_name: S.index[slug]?.owner_name || S.userName,
							allow_others: open,
							tags: editTags,
							views: S.index[slug]?.views || 0,
							created: S.index[slug]?.created || new Date().toISOString(),
							updated: new Date().toISOString()
						};
						await upsertIndexEntry(slug, S.index[slug]);
						// Update rank cache
						if (isNew) await updateRankCache(S.userName || S.user, {
							wikis: 1
						});
					})(), isNew ? t("edit_creating") : t("edit_saving"));

							pageData.comments.forEach(c => {

							});

							});

			async function doSearchDD() {
				const q = $('qryInp').value.trim().toLowerCase();
				const dd = $('searchDD');
				if (!dd) return;
				const hint = $('sdHint'),
					results = $('sdResults'),
					footer = $('sdFooter');
				if (!q) {
					hint.style.display = '';
					results.innerHTML = '';
					footer.style.display = '';
					return
				}
				hint.style.display = 'none';
				if (!S.index || !Object.keys(S.index).length) S.index = await loadIndex();
				let entries = Object.entries(S.index);
				// Filter by query
				entries = entries.filter(([s, m]) => (s.includes(q) || (m.title || '').toLowerCase().includes(q)));
				// Filter by tag
				if (sdTagFilter) entries = entries.filter(([, m]) => (m.tags || []).includes(sdTagFilter));
				// Sort
				if (sdSortMode === 'timeD') entries.sort((a, b) => ((b[1].updated || b[1].created || '') > (a[1].updated ||
					a[1].created || '') ? 1 : -1));
				else if (sdSortMode === 'alphaA') entries.sort((a, b) => (a[1].title || a[0]).localeCompare(b[1].title || b[
					0]));
				// Relevance is default (no sort)
				entries = entries.slice(0, 20);
				if (entries.length) {
					results.innerHTML = entries.map(([s, m]) =>
						`<div class="sd-item anim-fade" onclick="hideSearchDD();goTo('${esc(s)}')" style="animation-delay:${Math.random()*.06}s"><span class="sd-t">${esc(m.title||s)}</span><span class="sd-s">${s}</span><span class="sd-o">${m.owner_name?esc(m.owner_name):''}</span></div>`
					).join('');
				} else {
					results.innerHTML = '<div class="sd-hint" style="padding:12px 16px">' + t("search_no_results") +
						'</div>';
				}
				footer.style.display = entries.length > 0 ? '' : 'none';
			}

			// ─── Leaderboard Cache ───
			async function getRankCache() {
				try {
					return await load(K.rankCache)
				} catch {
					return {}
				}
			}
			async function setRankCache(v) {
				await save(K.rankCache, v)
			}
			async function updateRankCache(user, delta) {
				const c = await getRankCache();
				if (!c[user]) c[user] = {
					wikis: 0,
					edits: 0,
					comments: 0
				};
				const u = c[user];
				if (delta.wikis != null) u.wikis += delta.wikis;
				if (delta.comments != null) u.comments += delta.comments;
				if (u.wikis < 0) u.wikis = 0;
				if (u.comments < 0) u.comments = 0;
				await setRankCache(c);
			}

			// ─── Leaderboard ───
			async function showRank() {
				if (!await checkEditDirty()) return;
				screen('rankScreen');
				const body = $('rankBody');
				body.innerHTML = '<div class="empty" style="padding:60px 20px"><h2>' + t("rank_loading") + '</h2></div>';
				S.index = await wl(loadIndex(), t("rank_loading"));
				let cache = await getRankCache();
				// Auto-rebuild cache if empty (first deployment)
				if (!Object.keys(cache).length) {
					const slugs = Object.keys(S.index);
					for (let s = 0; s < slugs.length; s += 20) {
						await Promise.all(slugs.slice(s, s + 20).map(async slug => {
							try {
								const d = await load('zhujingqi_pedia_' + slug);
								if (d && d.comments) {
									const cc = {};
									d.comments.forEach(c => {
										const un = c.userName || c.user || '';
										if (un) cc[un] = (cc[un] || 0) + 1
									});
									for (const [un, cnt] of Object.entries(cc)) {
										if (!cache[un]) cache[un] = {
											wikis: 0,
											edits: 0,
											comments: 0
										};
										cache[un].comments += cnt;
									}
								}
							} catch {}
						}));
					}
					// Fill wikis/edits from index into cache
					Object.entries(S.index).forEach(([slug, m]) => {
						if (!m.owner_name) return;
						if (!cache[m.owner_name]) cache[m.owner_name] = {
							wikis: 0,
							edits: 0,
							comments: 0
						};
						cache[m.owner_name].wikis = (cache[m.owner_name].wikis || 0) + 1;
					});
					await setRankCache(cache);
				}
				// Count wikis from index
				const created = {};
				Object.entries(S.index).forEach(([slug, m]) => {
					if (!m.owner_name) return;
					created[m.owner_name] = (created[m.owner_name] || 0) + 1;
				});
				// Fetch ALL users from Supabase
				let allUsers = [];
				try {
					allUsers = await supaGet('/users?select=name,avatar,time&order=name.asc');
				} catch {}
				if (!allUsers || !allUsers.length) {
					body.innerHTML = '<div class="empty" style="padding:60px 20px"><h2>' + t("rank_empty") + '</h2></div>';
					return
				}
				// Build rows: wikis from index, comments from cache
				const rows = allUsers.map(u => ({
					name: u.name,
					avatar: u.avatar || '',
					time: u.time || '',
					wikis: created[u.name] || 0,
					cmts: (cache[u.name] && cache[u.name].comments) || 0
				}));
				rows.sort((a, b) => b.wikis - a.wikis || b.cmts - a.cmts);
				const medals = ['gold', 'silver', 'bronze'];
				let html = '<table class="rank-table"><thead><tr>' +
					'<th style="width:36px">#</th>' +
					'<th>' + t("rank_user") + '</th>' +
					'<th style="text-align:center;width:64px">' + t("rank_wikis") + '</th>' +
					'<th style="text-align:center;width:56px">' + t("rank_comments") + '</th>' +
					'</tr></thead><tbody>';
				for (let i = 0; i < rows.length; i++) {
					const r = rows[i];
					const rank = i + 1;
					const cls = rank <= 3 ? medals[rank - 1] : 'norm';
					const time = r.time ? new Date(r.time).toLocaleDateString() : '';
					const isMe = S.userName === r.name;
					html += `<tr onclick="showUserPages('${esc(r.name)}')">
      <td><span class="rank-num ${cls}" style="display:inline-flex">${rank}</span></td>
      <td><div class="rank-av">${r.avatar?`<img src="${esc(r.avatar)}" alt="">`:esc(r.name[0]||'?')}</div><span class="rank-un">${esc(r.name)}${isMe?' <span style="font-size:11px;color:var(--accent)">('+t("rank_me")+')</span>':''}</span>${time?`<span class="rank-join">${time}</span>`:''}</td>
      <td class="rank-stats">${r.wikis}</td>
      <td class="rank-stats">${r.cmts}</td>
    </tr>`;
				}
				html += '</tbody></table>';
				body.innerHTML = html;
			}
			$('rankBack').addEventListener('click', () => {
				if (S.slug) goTo(S.slug);
				else home()
			});

			// ─── Profile ───
			function renderProfileDesc(el, text) {
				el.textContent = text || '';
				el.className = 'profile-desc' + (text ? '' : ' empty');
			}
			async function openProfile(noHistory) {
				if (!S.user) return;
				S.index = await wl(loadIndex(), t("loading"));
				const my = Object.entries(S.index).filter(([, m]) => parseInt(m.owner_id) === parseInt(S.userId));
				const pub = my.filter(([, m]) => m.allow_others !== false).length;
				const pri = my.length - pub;
				$('profileAv').innerHTML = S.userAvatar ? `<img src="${esc(S.userAvatar)}" alt="">` :
					'<span class="av-initial" style="font-size:28px;font-weight:600;color:var(--text2)">' + esc((S
						.userName || S.user)[0]) + '</span>';
				$('profileNm').textContent = S.userName || S.user;
				$('profileJn').textContent = '';
				$('stPages').textContent = my.length;
				$('stPub').textContent = pub;
				$('stPri').textContent = pri;
				if (S.userId) supaGet('/users?id=eq.' + S.userId + '&select=time,avatar,description').then(arr => {
					if (arr && arr[0]) {
						if (arr[0].time) $('profileJn').textContent = t("profile_joined") + ' ' + new Date(arr[0]
							.time).toLocaleString();
						if (arr[0].avatar && arr[0].avatar !== S.userAvatar) {
							S.userAvatar = arr[0].avatar;
							$('profileAv').innerHTML = `<img src="${esc(S.userAvatar)}" alt="">`
						}
						renderProfileDesc($('profileDesc'), arr[0].description || '')
					}
				});
				const lst = $('profileLst');
				if (!my.length) lst.innerHTML = '<div class="empty" style="padding:40px 20px"><h2>' + t("profile_no_pages") +
					'</h2><p>' + t("profile_hint") + '</p></div>';
				else lst.innerHTML = '<div class="profile-lst-t">' + t("profile_my") + '</div>' + my.sort((a, b) => ((b[1]
					.updated || b[1].created) > (a[1].updated || a[1].created) ? 1 : -1)).map(([slug, meta]) => {
					const lbl = meta.allow_others !== false ? t("profile_public") : t("profile_private");
					const dt = meta.updated ? new Date(meta.updated).toLocaleDateString() : '';
					const tags = (meta.tags || []).map(t =>
						`<span class="tag" onclick="event.stopPropagation();filterByTag('${esc(t)}')">${esc(t)}</span>`
					).join('');
					return `<div class="profile-it anim-fade" style="animation-delay:${Math.random()*.1}s"><div class="it-inf" onclick="goTo('${slug}')"><div class="it-t">${esc(meta.title||slug)}</div><div class="it-m">${lbl}${dt?' · '+dt:''}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${tags}</div></div><div class="it-act"><button onclick="event.stopPropagation();editPage('${slug}')">${t("edit")}</button><button class="del" onclick="event.stopPropagation();delPage('${slug}')">${t("del")}</button></div></div>`
				}).join('');
				screen('profileScreen');
				if (!noHistory) pushView('profile', S.userName || S.user);
			}
			$('createNavBtn').addEventListener('click', async () => {
				if (!S.user) {
					toast(t("toast_login_first"));
					openLogin();
					return
				}
				if (!await checkEditDirty()) return;
				editPage()
			});

			// ─── User Pages ───
			async function showUserPages(user, noHistory) {
				if (!user) return;
				S.index = await wl(loadIndex(), t("loading"));
				const my = Object.entries(S.index).filter(([, m]) => m.owner_name === user);
				const isMe = user === S.user;
				$('profileAv').innerHTML =
					'<span class="av-initial" style="font-size:28px;font-weight:600;color:var(--text2)">' + esc(user[0]) +
					'</span>';
				$('profileNm').textContent = user;
				$('profileJn').textContent = '';
				$('stPages').textContent = my.length;
				$('stPub').textContent = my.filter(([, m]) => m.allow_others !== false).length;
				$('stPri').textContent = my.filter(([, m]) => m.allow_others === false).length;
				supaGet('/users?name=eq.' + encodeURIComponent(user) + '&select=time,avatar,description').then(arr => {
					if (arr && arr[0]) {
						if (arr[0].time) $('profileJn').textContent = t("profile_joined") + ' ' + new Date(arr[0]
							.time).toLocaleString();
						if (arr[0].avatar) {
							const ua = arr[0].avatar;
							if (isMe) S.userAvatar = ua;
							$('profileAv').innerHTML = `<img src="${esc(ua)}" alt="">`
						}
						renderProfileDesc($('profileDesc'), arr[0].description || '')
					}
				});
				const lst = $('profileLst');
				if (!my.length) lst.innerHTML = '<div class="empty" style="padding:40px 20px"><h2>' + t("profile_no_pages") +
					'</h2></div>';
				else lst.innerHTML = '<div class="profile-lst-t">' + t("profile_pages") + '</div>' + my.sort((a, b) => ((b[1]
					.updated || b[1].created) > (a[1].updated || a[1].created) ? 1 : -1)).map(([slug, meta]) => {
					const dt = meta.updated ? new Date(meta.updated).toLocaleDateString() : '';
					const tags = (meta.tags || []).map(t =>
						`<span class="tag" onclick="event.stopPropagation();filterByTag('${esc(t)}')">${esc(t)}</span>`
					).join('');
					return `<div class="profile-it anim-fade" style="animation-delay:${Math.random()*.1}s"><div class="it-inf" onclick="goTo('${slug}')"><div class="it-t">${esc(meta.title||slug)}</div><div class="it-m">${dt||''}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${tags}</div></div>${isMe?`<div class="it-act"><button onclick="event.stopPropagation();editPage('${slug}')">${t("edit")}</button><button class="del" onclick="event.stopPropagation();delPage('${slug}')">${t("del")}</button></div>`:''}</div>`
				}).join('');
				screen('profileScreen');
				if (!noHistory) pushView('profile', user);
			}

			// ─── Keys ───
			document.addEventListener('keydown', e => {
				const c = e.ctrlKey || e.metaKey;
				if (e.key === 'Escape') {
					if ($('loginModal').classList.contains('active')) $('loginModal').classList.remove('active');
					else if ($('confirmModal').classList.contains('active')) $('confirmNo').click();
					else if (S.view === 'editScreen') $('editBack').click()
				}
				if (c && e.key === 's' && S.view === 'editScreen') {
					e.preventDefault();
					$('editSave').click()
				}
				if (c && e.key === 'b' && S.view === 'editScreen') {
					e.preventDefault();
					document.querySelector('[data-cmd="bold"]')?.click()
				}
				if (c && e.key === 'i' && S.view === 'editScreen') {
					e.preventDefault();
					document.querySelector('[data-cmd="italic"]')?.click()
				}
				if (e.key === 'Enter' && $('loginModal').classList.contains('active')) $('modalBtn').click();
			});

			// ─── Lightbox ───
			let lbIdx = 0,
				lbZoom = 1,
				lbX = 0,
				lbY = 0,
				lbDrag = null;

			function openLightbox(i) {
				const imgs = window.__galImgs || [];
				if (!imgs.length) return;
				lbIdx = i;
				lbZoom = 1;
				lbX = 0;
				lbY = 0;
				updateLightbox();
				$('lightbox').classList.add('active');
				document.body.style.overflow = 'hidden';
			}

			function closeLightbox() {
				$('lightbox').classList.remove('active');
				document.body.style.overflow = '';
			}

			function updateLightbox() {
				const imgs = window.__galImgs || [];
				$('lbImg').src = imgs[lbIdx] || '';
				$('lbImg').style.transform = 'translate(' + lbX + 'px,' + lbY + 'px) scale(' + lbZoom + ')';
				$('lbCounter').textContent = (lbIdx + 1) + ' / ' + imgs.length;
			}
			$('lbClose').addEventListener('click', closeLightbox);
			$('lbPrev').addEventListener('click', () => {
				const imgs = window.__galImgs || [];
				if (imgs.length) {
					lbIdx = (lbIdx - 1 + imgs.length) % imgs.length;
					lbZoom = 1;
					lbX = 0;
					lbY = 0;
					updateLightbox()
				}
			});
			$('lbNext').addEventListener('click', () => {
				const imgs = window.__galImgs || [];
				if (imgs.length) {
					lbIdx = (lbIdx + 1) % imgs.length;
					lbZoom = 1;
					lbX = 0;
					lbY = 0;
					updateLightbox()
				}
			});
			$('lightbox').addEventListener('click', e => {
				if (e.target === $('lightbox')) closeLightbox()
			});
			document.addEventListener('keydown', e => {
				if (!$('lightbox').classList.contains('active')) return;
				const imgs = window.__galImgs || [];
				if (e.key === 'Escape') closeLightbox();
				if (e.key === 'ArrowLeft' && imgs.length) {
					lbIdx = (lbIdx - 1 + imgs.length) % imgs.length;
					lbZoom = 1;
					lbX = 0;
					lbY = 0;
					updateLightbox()
				}
				if (e.key === 'ArrowRight' && imgs.length) {
					lbIdx = (lbIdx + 1) % imgs.length;
					lbZoom = 1;
					lbX = 0;
					lbY = 0;
					updateLightbox()
				}
				if (e.key === '+' || e.key === '=') {
					e.preventDefault();
					lbZoom = Math.min(5, lbZoom + .25);
					updateLightbox()
				}
				if (e.key === '-') {
					e.preventDefault();
					lbZoom = Math.max(.25, lbZoom - .25);
					updateLightbox()
				}
				if (e.key === '0') {
					lbZoom = 1;
					lbX = 0;
					lbY = 0;
					updateLightbox()
				}
			});
			$('lbImgWrap').addEventListener('wheel', e => {
				e.preventDefault();
				const old = lbZoom;
				lbZoom = Math.max(.25, Math.min(5, lbZoom + (e.deltaY > 0 ? -.25 : .25)));
				// Adjust position so zoom centers on cursor
				const r = $('lbImgWrap').getBoundingClientRect();
				lbX -= (e.clientX - r.left - r.width / 2) * (lbZoom / old - 1);
				lbY -= (e.clientY - r.top - r.height / 2) * (lbZoom / old - 1);
				updateLightbox();
			}, {
				passive: false
			});
			$('lbImg').addEventListener('mousedown', e => {
				e.preventDefault();
				lbDrag = {
					sx: e.clientX,
					sy: e.clientY,
					ox: lbX,
					oy: lbY
				};
				$('lbImg').style.cursor = 'grabbing';
			});
			document.addEventListener('mousemove', e => {
				if (!lbDrag) return;
				lbX = lbDrag.ox + (e.clientX - lbDrag.sx);
				lbY = lbDrag.oy + (e.clientY - lbDrag.sy);
				updateLightbox();
			});
			document.addEventListener('mouseup', () => {
				if (!lbDrag) return;
				lbDrag = null;
				$('lbImg').style.cursor = 'grab';
			});

			function esc(s) {
				const d = document.createElement('div');
				d.textContent = s;
				return d.innerHTML
			}

			$('termsBack').addEventListener('click', () => {
				if (S.slug) goTo(S.slug);
				else home()
			});

			function $$(s, c) {
				return (c || document).querySelectorAll(s)
			}

			document.addEventListener('contextmenu', e => {
				const a = e.target.closest(
					'#pageContent,.comments-section,.refs-section,.lightbox,.gallery-section,.gal-edit');
				if (!a) e.preventDefault();
			});
			$('logoBtn').addEventListener('click', async () => {
				if (!await checkEditDirty()) return;
				home()
			});
			(async () => {
				// Apply initial dark mode
				if (localStorage.getItem("pedia_dark") === "1") {
					document.body.classList.add("dark");
					updateDarkBtn();
				}
				// Apply initial language
				renderLangSelect();
				refreshUILanguage();

				if (S.userId) {
					try {
						const arr = await supaGet('/users?id=eq.' + S.userId + '&select=name,avatar');
						if (arr && arr[0]) {
							S.user = arr[0].name;
							S.userName = arr[0].name;
							S.userAvatar = arr[0].avatar || '';
							commentUserCache[S.userId] = {
								name: S.userName,
								avatar: S.userAvatar
							}
						}
					} catch {}
				}
				nav();
				initGalDrag();
				const p = new URLSearchParams(location.search);
				const id = p.get('id'),
					view = p.get('view'),
					user = p.get('user');
				if (id) await goTo(id);
				else if (view === 'all') await allWiki();
				else if (view === 'edit') {
					if (S.user) editPage();
					else await home()
				} else if (user) await showUserPages(user);
				else await home()
			})();
		</script>
